##
# Update the DNF package cache and install packages as a root user
##

- name: Bootstrap python3-apt for Python 3.9
  raw: apt-get install -y python3-apt python3.9-distutils 2>/dev/null; python3.9 -c "import apt" 2>/dev/null || apt-get install --reinstall -y python3-apt
  become: true
  changed_when: false

- name: Update and upgrade apt packages
  become: true
  apt:
    upgrade: yes
    update_cache: yes
    cache_valid_time: 86400 #One day

- name: deadsnakes
  apt_repository:
    repo: ppa:deadsnakes/ppa
  become: true

- name: curl for nodejs
  shell: curl -sL https://deb.nodesource.com/setup_18.x | sudo -E bash -     
  become: true



- name: Install required packages
  apt: 
    name: ['software-properties-common','build-essential' ,'libssl-dev','libffi-dev' ,'python3.8','postgresql','postgresql-contrib'
      ,'virtualenv'
      ,'redis-server'
      ,'nodejs','python3-psycopg2'
    ]
    state: latest 
  become: yes
    

    
